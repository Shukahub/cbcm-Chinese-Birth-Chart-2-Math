[project]
name = "cbcm-core"
version = "0.1.0"
description = "cbcm 理论内核：干支(Z60)、五行(C5)、易经(F2^n)、八字排盘、算子层（应用无关）"
readme = "../../docs/03-ganzhi.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
precise = ["lunar_python>=1.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cbcm"]
