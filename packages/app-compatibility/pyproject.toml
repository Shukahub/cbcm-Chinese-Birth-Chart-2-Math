[project]
name = "cbcm-app-compatibility"
version = "0.1.0"
description = "合婚应用库：两张命盘的干支/五行/生肖关系分析（消费者，含经验断言）"
requires-python = ">=3.11"
dependencies = ["cbcm-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cbcm_compat"]

[project.scripts]
cbcm-compatibility = "cbcm_compat.__main__:main"
